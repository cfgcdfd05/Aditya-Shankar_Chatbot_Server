<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDFD Lab Assistant</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Marked.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- PrismJS for Syntax Highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>

    <style>
        :root {
            --bg-color: #050b14;
            --glass-bg: rgba(15, 23, 42, 0.65);
            --glass-border: rgba(14, 165, 233, 0.2);
            --user-msg: rgba(14, 165, 233, 0.15);
            --bot-msg: transparent;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #0ea5e9;
            --accent-glow: rgba(14, 165, 233, 0.5);
            --reasoning-bg: rgba(2, 6, 23, 0.5);
            --reasoning-border: rgba(148, 163, 184, 0.2);
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #020617;
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Animated Liquid Glass Blobs */
        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.35;
            z-index: -1;
            animation: float 20s infinite alternate ease-in-out;
            pointer-events: none;
        }
        .blob-1 { width: 500px; height: 500px; background: #0ea5e9; top: -10%; left: -10%; }
        .blob-2 { width: 450px; height: 450px; background: #8b5cf6; bottom: -5%; right: -5%; animation-delay: -5s; }
        .blob-3 { width: 350px; height: 350px; background: #ec4899; top: 40%; left: 30%; animation-delay: -10s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(40px, 60px) scale(1.1); }
            100% { transform: translate(-30px, 30px) scale(0.9); }
        }

        /* --- Scrollbar --- */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.3);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover { background: rgba(148, 163, 184, 0.6); }

        /* --- Authentication Overlay --- */
        #auth-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(5, 11, 20, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .glass-box {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            padding: 3rem 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5), 0 0 0 1px var(--glass-border) inset;
            text-align: center;
            width: 90%;
            max-width: 420px;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-box h2 {
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 1.5rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .glass-box p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .auth-input-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        input[type="password"], textarea {
            padding: 0.85rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.3);
            color: var(--text-main);
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: all 0.2s;
        }

        input[type="password"]:focus, textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .btn-primary {
            padding: 0.85rem;
            background: linear-gradient(135deg, var(--accent), #0284c7);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn-primary:hover { opacity: 0.9; }
        .btn-primary:active { transform: scale(0.98); }

        #auth-error {
            color: var(--danger);
            font-size: 0.85rem;
            margin-top: 1rem;
            min-height: 20px;
        }

        /* --- Main Layout --- */
        #app-layout {
            display: none;
            height: 100vh;
            width: 100%;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            border-right: 1px solid var(--glass-border);
            background: rgba(15, 23, 42, 0.4);
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 2rem;
        }

        .brand-icon {
            width: 24px;
            height: 24px;
            color: var(--accent);
        }

        .quick-prompts-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .prompt-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 0.8rem;
            border-radius: 8px;
            margin-bottom: 0.75rem;
            font-size: 0.9rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .prompt-btn:hover {
            background: rgba(14, 165, 233, 0.1);
            border-color: var(--accent);
            transform: translateX(4px);
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid var(--glass-border);
        }

        .clear-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--glass-border);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            width: 100%;
            transition: color 0.2s;
        }

        .clear-btn:hover {
            color: var(--danger);
            border-color: var(--danger);
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            width: 100%;
            max-width: 850px;
            margin: 0 auto;
            animation: fadeIn 0.3s ease-out;
        }

        .message.user { justify-content: flex-end; }
        .message.assistant { justify-content: flex-start; }

        .bubble {
            padding: 1rem 1.5rem;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 1rem;
            max-width: 85%;
        }

        .user .bubble {
            background: var(--user-msg);
            border: 1px solid var(--glass-border);
            border-bottom-right-radius: 4px;
        }

        .assistant .bubble {
            background: var(--bot-msg);
            border-radius: 4px;
        }

        /* Markdown Overrides */
        .bubble p { margin-bottom: 1rem; }
        .bubble p:last-child { margin-bottom: 0; }
        
        .bubble pre {
            background: #020617;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1rem 0;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .bubble code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9em;
        }
        
        .bubble p code, .bubble li code {
            background: rgba(14, 165, 233, 0.15);
            color: #38bdf8;
            padding: 0.2em 0.4em;
            border-radius: 4px;
        }

        /* Claude-style Reasoning blocks */
        details.reasoning {
            background: rgba(255, 255, 255, 0.03);
            border-left: 3px solid #475569;
            border-radius: 0 12px 12px 0;
            margin-bottom: 1.5rem;
            overflow: hidden;
            backdrop-filter: blur(8px);
            border-top: 1px solid rgba(255,255,255,0.05);
            border-right: 1px solid rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        details.reasoning[open] {
            border-left-color: #a855f7;
        }

        details.reasoning summary {
            cursor: pointer;
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            user-select: none;
            display: flex;
            align-items: center;
            outline: none;
            background: rgba(0,0,0,0.2);
        }

        details.reasoning summary:hover {
            color: var(--text-main);
            background: rgba(255,255,255,0.05);
        }

        details.reasoning summary::-webkit-details-marker { display: none; }
        
        details.reasoning summary::before {
            content: '▶';
            font-size: 0.7rem;
            margin-right: 8px;
            transition: transform 0.2s;
        }
        
        details.reasoning[open] summary::before {
            transform: rotate(90deg);
        }

        .reasoning-content {
            padding: 1rem;
            font-size: 0.9rem;
            color: #cbd5e1;
            border-top: 1px solid var(--reasoning-border);
        }

        /* Input Area */
        .input-area {
            padding: 1.5rem 2rem;
            background: linear-gradient(transparent, var(--bg-color) 30%);
        }

        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 1rem;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            padding: 0.75rem 1rem;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: border-color 0.2s, box-shadow 0.2s;
            max-width: 850px;
            margin: 0 auto;
            width: 100%;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 0 1px var(--accent) inset;
        }

        #chat-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.5rem 0;
            resize: none;
            min-height: 24px;
            max-height: 200px;
        }

        .send-btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .send-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .send-btn:disabled {
            background: var(--text-muted);
            opacity: 0.5;
            cursor: not-allowed;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 18px;
            background: var(--accent);
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 4px;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* Mobile */
        @media (max-width: 768px) {
            #app-layout { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--glass-border); padding: 1rem; }
            .quick-prompts-title, .clear-btn { display: none; }
            .prompt-btn { display: inline-block; width: auto; margin-right: 0.5rem; margin-bottom: 0; padding: 0.5rem 1rem; white-space: nowrap; }
            .sidebar { flex-direction: row; align-items: center; justify-content: space-between; overflow-x: auto; }
            .brand { margin-bottom: 0; }
            #messages { padding: 1rem; }
            .message { max-width: 95%; }
            .input-area { padding: 1rem; }
        }
    </style>
</head>
<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>

    <!-- Auth Overlay -->
    <div id="auth-overlay">
        <div class="glass-box">
            <h2>
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="brand-icon">
                    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                </svg>
                CDFD Access
            </h2>
            <p>Authorized Laboratory Personnel Only</p>
            <div class="auth-input-group">
                <input type="password" id="pwd-input" placeholder="Enter security key..." autocomplete="off">
                <button id="auth-btn" class="btn-primary">Unlock System</button>
            </div>
            <div id="auth-error"></div>
        </div>
    </div>

    <!-- Main Layout -->
    <div id="app-layout">
        <aside class="sidebar">
            <div class="brand">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="brand-icon">
                    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                </svg>
                Lab Assistant
            </div>
            
            <div class="quick-prompts-title">Quick Prompts</div>
            <button class="prompt-btn" onclick="setPrompt('Analyze this FASTA DNA sequence and highlight any obvious anomalies or consensus regions:\n\n>Sequence_1\n')">🧬 Analyze DNA (FASTA)</button>
            <button class="prompt-btn" onclick="setPrompt('I need the standard protocol for extracting high-quality RNA from tissue samples. Include necessary reagents and precautions.')">🔬 RNA Protocol</button>

            
            <div class="sidebar-footer">
                <button class="clear-btn" id="thinking-toggle" onclick="toggleThinking()">🧠 Thinking: On</button>
                <button class="clear-btn" onclick="clearHistory()">Clear Session</button>
            </div>
        </aside>

        <main class="chat-area">
            <div id="messages">
                <!-- Messages -->
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="chat-input" placeholder="Query the laboratory model... (Shift+Enter for newline)" rows="1"></textarea>
                    <button id="send-btn" class="send-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // DOM Elements
        const authOverlay = document.getElementById('auth-overlay');
        const appLayout = document.getElementById('app-layout');
        const pwdInput = document.getElementById('pwd-input');
        const authBtn = document.getElementById('auth-btn');
        const authError = document.getElementById('auth-error');
        
        const messagesDiv = document.getElementById('messages');
        let thinkingEnabled = true;
        function toggleThinking() {
            thinkingEnabled = !thinkingEnabled;
            document.getElementById('thinking-toggle').textContent = thinkingEnabled ? '🧠 Thinking: On' : '🧠 Thinking: Off';
        }
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');

        // State
        let sessionPassword = localStorage.getItem('cdfd_token') || '';
        let conversationHistory = JSON.parse(localStorage.getItem('cdfd_history')) || [];
        let isGenerating = false;

        // Configuration for marked
        marked.setOptions({
            breaks: true,
            gfm: true
        });

        // --- AUTHENTICATION ---
        async function verifyLogin(password) {
            try {
                const res = await fetch('/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const data = await res.json();
                if (data.success) {
                    sessionPassword = password;
                    localStorage.setItem('cdfd_token', password);
                    authOverlay.style.display = 'none';
                    appLayout.style.display = 'flex';
                    renderHistory();
                    chatInput.focus();
                } else {
                    authError.textContent = data.error || 'Access Denied';
                    pwdInput.value = '';
                }
            } catch (err) {
                authError.textContent = 'Network error contacting server.';
            }
        }

        authBtn.addEventListener('click', () => verifyLogin(pwdInput.value));
        pwdInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') verifyLogin(pwdInput.value);
        });

        if (sessionPassword) {
            verifyLogin(sessionPassword);
        }

        // --- UI UTILS ---
        function setPrompt(text) {
            chatInput.value = text;
            chatInput.focus();
            chatInput.style.height = 'auto';
            chatInput.style.height = (chatInput.scrollHeight) + 'px';
        }

        function clearHistory() {
            if (confirm('Clear entire session history?')) {
                conversationHistory = [];
                localStorage.removeItem('cdfd_history');
                messagesDiv.innerHTML = '';
            }
        }

        chatInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight < 200 ? this.scrollHeight : 200) + 'px';
        });

        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // --- ADVANCED MARKDOWN RENDERER ---
        // Splits text into reasoning and normal blocks to prevent flickering details
        function renderAdvancedMarkdown(rawText, generating) {
            let segments = [];
            let currentIdx = 0;

            while (true) {
                let thinkStart = rawText.indexOf('<think>', currentIdx);
                if (thinkStart === -1) {
                    segments.push({ type: 'text', content: rawText.substring(currentIdx) });
                    break;
                }

                if (thinkStart > currentIdx) {
                    segments.push({ type: 'text', content: rawText.substring(currentIdx, thinkStart) });
                }

                let thinkEnd = rawText.indexOf('</think>', thinkStart + 7);
                if (thinkEnd === -1) {
                    segments.push({ type: 'think', content: rawText.substring(thinkStart + 7), closed: false });
                    break;
                } else {
                    segments.push({ type: 'think', content: rawText.substring(thinkStart + 7, thinkEnd), closed: true });
                    currentIdx = thinkEnd + 8;
                }
            }

            let finalHtml = '';
            for (const seg of segments) {
                if (!seg.content.trim() && seg.type !== 'think') continue;
                
                if (seg.type === 'text') {
                    finalHtml += marked.parse(seg.content);
                } else if (seg.type === 'think') {
                    // If generating and not closed, force open. If closed, collapse it.
                    let openAttr = (generating && !seg.closed) ? 'open' : '';
                    let summaryText = (generating && !seg.closed) ? '🤔 Thinking...' : '💡 Thought Process';
                    let parsedThink = marked.parse(seg.content);
                    finalHtml += `<details class="reasoning" ${openAttr}><summary>${summaryText}</summary><div class="reasoning-content">${parsedThink}</div></details>`;
                }
            }
            return finalHtml;
        }

        function appendMessageDOM(role) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            msgDiv.appendChild(bubble);
            messagesDiv.appendChild(msgDiv);
            return bubble;
        }

        function renderHistory() {
            messagesDiv.innerHTML = '';
            for (const msg of conversationHistory) {
                const bubble = appendMessageDOM(msg.role);
                if (msg.role === 'user') {
                    bubble.textContent = msg.content;
                } else {
                    bubble.innerHTML = renderAdvancedMarkdown(msg.content, false);
                }
            }
            if (window.Prism) Prism.highlightAllUnder(messagesDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        let abortController = null;

        function setButtonState(generating) {
            if (generating) {
                sendBtn.innerHTML = `
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect>
                    </svg>
                `;
                sendBtn.style.backgroundColor = 'var(--danger)';
            } else {
                sendBtn.innerHTML = `
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                `;
                sendBtn.style.backgroundColor = 'var(--accent)';
            }
        }

        sendBtn.addEventListener('click', () => {
            if (isGenerating) {
                if (abortController) {
                    abortController.abort();
                }
            } else {
                sendMessage();
            }
        });

        async function sendMessage() {
            const content = chatInput.value.trim();
            if (!content || isGenerating) return;

            chatInput.value = '';
            chatInput.style.height = 'auto';
            
            const userBubble = appendMessageDOM('user');
            userBubble.textContent = content;
            conversationHistory.push({ role: 'user', content: content });
            localStorage.setItem('cdfd_history', JSON.stringify(conversationHistory));

            isGenerating = true;
            setButtonState(true);
            
            const aiBubble = appendMessageDOM('assistant');
            
            // DOM Nodes for streaming
            const thinkDetails = document.createElement('details');
            thinkDetails.className = 'reasoning';
            thinkDetails.open = true;
            thinkDetails.style.display = 'none';
            const thinkSummary = document.createElement('summary');
            thinkSummary.innerHTML = '🤔 Thinking...';
            thinkDetails.appendChild(thinkSummary);
            const thinkContentDiv = document.createElement('div');
            thinkContentDiv.className = 'reasoning-content';
            thinkDetails.appendChild(thinkContentDiv);
            
            const mainContentDiv = document.createElement('div');
            mainContentDiv.className = 'main-content';
            
            aiBubble.appendChild(thinkDetails);
            aiBubble.appendChild(mainContentDiv);
            
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            let assistantContent = '';
            let hasSeparateReasoning = false;
            let sepDisplayThink = '';
            try {
                abortController = new AbortController();
                // Send password in payload for security
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        messages: conversationHistory,
                        password: sessionPassword,
                        thinking: thinkingEnabled
                    }),
                    signal: abortController.signal
                });

                if (response.status === 401) {
                    localStorage.removeItem('cdfd_token');
                    location.reload();
                    return;
                }
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let buffer = '';

                // Keep track of scroll intent
                let isScrolledToBottom = true;
                messagesDiv.addEventListener('scroll', () => {
                    const diff = messagesDiv.scrollHeight - messagesDiv.scrollTop - messagesDiv.clientHeight;
                    isScrolledToBottom = diff < 10;
                });

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); 
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.slice(6);
                            if (dataStr.trim() === '[DONE]') continue;
                            
                            try {
                                const data = JSON.parse(dataStr);
                                if (data.content || data.reasoning) {
                                    if (data.reasoning) {
                                        hasSeparateReasoning = true;
                                        sepDisplayThink += data.reasoning;
                                    }
                                    if (data.content) {
                                        assistantContent += data.content;
                                    }
                                    
                                    if (hasSeparateReasoning) {
                                        thinkDetails.style.display = 'block';
                                        if (assistantContent) {
                                            thinkSummary.innerHTML = '💡 Thought Process';
                                            thinkContentDiv.innerHTML = marked.parse(sepDisplayThink);
                                            mainContentDiv.innerHTML = marked.parse(assistantContent) + '<span class="cursor"></span>';
                                        } else {
                                            thinkSummary.innerHTML = '🤔 Thinking...';
                                            thinkContentDiv.innerHTML = marked.parse(sepDisplayThink) + '<span class="cursor"></span>';
                                        }
                                    } else {
                                        // Legacy: parsing <think> out of assistantContent
                                        let thinkStart = assistantContent.indexOf('<think>');
                                        let thinkEnd = assistantContent.indexOf('</think>');
                                        
                                        let displayThink = '';
                                        let displayMain = '';
                                        
                                        if (thinkStart !== -1) {
                                            thinkDetails.style.display = 'block';
                                            if (thinkEnd !== -1) {
                                                displayThink = assistantContent.substring(thinkStart + 7, thinkEnd);
                                                displayMain = assistantContent.substring(0, thinkStart) + assistantContent.substring(thinkEnd + 8);
                                                thinkSummary.innerHTML = '💡 Thought Process';
                                            } else {
                                                displayThink = assistantContent.substring(thinkStart + 7);
                                                displayMain = assistantContent.substring(0, thinkStart);
                                                thinkSummary.innerHTML = '🤔 Thinking...';
                                            }
                                        } else {
                                            displayMain = assistantContent;
                                        }
                                        
                                        if (thinkEnd !== -1) {
                                            thinkContentDiv.innerHTML = marked.parse(displayThink);
                                            mainContentDiv.innerHTML = marked.parse(displayMain) + '<span class="cursor"></span>';
                                        } else if (thinkStart !== -1) {
                                            thinkContentDiv.innerHTML = marked.parse(displayThink) + '<span class="cursor"></span>';
                                            mainContentDiv.innerHTML = marked.parse(displayMain);
                                        } else {
                                            mainContentDiv.innerHTML = marked.parse(displayMain) + '<span class="cursor"></span>';
                                        }
                                    }
                                    
                                    // Syntax highlighting debounced
                                    if (window.Prism && Math.random() < 0.1) {
                                        Prism.highlightAllUnder(aiBubble);
                                    }

                                    if (isScrolledToBottom) {
                                        messagesDiv.scrollTop = messagesDiv.scrollHeight;
                                    }
                                } else if (data.error) {
                                    assistantContent += `\n\n**Error:** ${data.error}`;
                                    mainContentDiv.innerHTML = marked.parse(assistantContent);
                                }
                            } catch (e) {}
                        }
                    }
                }
            } catch (err) {
                if (err.name === 'AbortError') {
                    assistantContent += `\n\n*Generation stopped by user.*`;
                } else {
                    assistantContent += `\n\n**Connection Error:** Could not reach the server.`;
                }
                mainContentDiv.innerHTML = marked.parse(assistantContent);
            } finally {
                // Remove cursor from main content
                if (mainContentDiv.innerHTML.endsWith('<span class="cursor"></span>')) {
                    mainContentDiv.innerHTML = mainContentDiv.innerHTML.slice(0, -28);
                }
                
                // Collapse the think block automatically upon completion like Claude
                if (thinkDetails.style.display === 'block') {
                    thinkDetails.open = false;
                }
                
                if (window.Prism) Prism.highlightAllUnder(aiBubble);
                
                let finalContentToSave = assistantContent;
                if (hasSeparateReasoning) {
                    finalContentToSave = `<think>\n${sepDisplayThink}\n</think>\n${assistantContent}`;
                }
                conversationHistory.push({ role: 'assistant', content: finalContentToSave });
                localStorage.setItem('cdfd_history', JSON.stringify(conversationHistory));
                
                isGenerating = false;
                setButtonState(false);
                chatInput.focus();
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
                abortController = null;
            }
        }
    </script>
</body>
</html>
