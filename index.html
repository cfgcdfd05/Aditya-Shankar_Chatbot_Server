<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumen LLM Chat</title>
    <!-- Marked.js for Markdown Rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --chat-bg: #1e293b;
            --user-msg: #3b82f6;
            --bot-msg: #334155;
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
            --border-color: #475569;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Authentication Overlay --- */
        #auth-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .auth-box {
            background: var(--chat-bg);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid var(--border-color);
            width: 90%;
            max-width: 400px;
        }

        .auth-box h2 {
            margin-bottom: 1.5rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .auth-input-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        #pwd-input {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        #pwd-input:focus {
            border-color: var(--accent);
        }

        #auth-btn {
            padding: 0.75rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        #auth-btn:hover {
            background: var(--accent-hover);
        }

        #auth-error {
            color: #ef4444;
            font-size: 0.875rem;
            margin-top: 1rem;
            min-height: 20px;
        }

        /* Shake Animation */
        .shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        /* --- Chat Interface --- */
        #chat-container {
            display: none;
            flex-direction: column;
            height: 100vh;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-color);
        }
        
        .header h1 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .model-badge {
            font-size: 0.75rem;
            background: var(--chat-bg);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }

        .message.user {
            align-self: flex-end;
        }

        .message.assistant {
            align-self: flex-start;
        }

        .bubble {
            padding: 1rem 1.25rem;
            border-radius: 12px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user .bubble {
            background: var(--user-msg);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .assistant .bubble {
            background: var(--bot-msg);
            color: var(--text-main);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border-color);
        }

        /* Markdown Overrides in Bubble */
        .bubble p { margin-bottom: 0.75rem; }
        .bubble p:last-child { margin-bottom: 0; }
        .bubble pre {
            background: #0f172a;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 0.75rem 0;
            border: 1px solid #1e293b;
        }
        .bubble code {
            font-family: Consolas, Monaco, 'Andale Mono', 'Ubuntu Mono', monospace;
            background: rgba(0,0,0,0.3);
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-size: 0.9em;
        }
        .bubble pre code {
            background: transparent;
            padding: 0;
        }

        /* Reasoning blocks for <think> tags */
        details.reasoning {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 0.5rem;
            margin-bottom: 0.75rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        details.reasoning summary {
            cursor: pointer;
            font-weight: 500;
            outline: none;
            user-select: none;
        }

        details.reasoning summary:hover {
            color: var(--text-main);
        }

        .input-area {
            padding: 1.5rem;
            background: var(--bg-color);
            border-top: 1px solid var(--border-color);
        }

        .input-wrapper {
            display: flex;
            gap: 1rem;
            background: var(--chat-bg);
            padding: 0.75rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
        }

        #chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1rem;
            resize: none;
            outline: none;
            min-height: 24px;
            max-height: 200px;
            font-family: inherit;
            line-height: 1.5;
            padding: 0.25rem 0;
        }

        #send-btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
            align-self: flex-end;
        }

        #send-btn:hover {
            background: var(--accent-hover);
        }

        #send-btn:disabled {
            background: var(--border-color);
            cursor: not-allowed;
            opacity: 0.7;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background: var(--text-main);
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
    </style>
</head>
<body>

    <!-- Auth Overlay -->
    <div id="auth-overlay">
        <div class="auth-box" id="auth-box">
            <h2>Lumen Access</h2>
            <div class="auth-input-group">
                <input type="password" id="pwd-input" placeholder="Enter password..." autocomplete="off">
                <button id="auth-btn">Unlock</button>
            </div>
            <div id="auth-error"></div>
        </div>
    </div>

    <!-- Chat Container -->
    <div id="chat-container">
        <div class="header">
            <h1>Lumen Chat</h1>
            <span class="model-badge">deepseek-r1:70b</span>
        </div>
        
        <div id="messages">
            <!-- Messages will be appended here dynamically -->
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="chat-input" placeholder="Type a message... (Enter to send, Shift+Enter for new line)" rows="1"></textarea>
                <button id="send-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const authOverlay = document.getElementById('auth-overlay');
        const authBox = document.getElementById('auth-box');
        const pwdInput = document.getElementById('pwd-input');
        const authBtn = document.getElementById('auth-btn');
        const authError = document.getElementById('auth-error');
        
        const chatContainer = document.getElementById('chat-container');
        const messagesDiv = document.getElementById('messages');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');

        // State
        let conversationHistory = [];
        let isGenerating = false;

        // --- AUTHENTICATION ---
        function checkAuth() {
            // sessionStorage persists per tab session, perfect for this requirement
            if (sessionStorage.getItem('auth_ok') === 'true') {
                showChat();
            } else {
                pwdInput.focus();
            }
        }

        function handleLogin() {
            if (pwdInput.value === 'cdfd') {
                sessionStorage.setItem('auth_ok', 'true');
                showChat();
            } else {
                authError.textContent = 'Incorrect password';
                authBox.classList.remove('shake');
                void authBox.offsetWidth; // trigger reflow to restart animation
                authBox.classList.add('shake');
                pwdInput.value = '';
                pwdInput.focus();
            }
        }

        function showChat() {
            authOverlay.style.display = 'none';
            chatContainer.style.display = 'flex';
            chatInput.focus();
        }

        authBtn.addEventListener('click', handleLogin);
        pwdInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleLogin();
        });

        // Init Check
        checkAuth();

        // --- CHAT LOGIC ---
        
        // Auto-resize textarea
        chatInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight < 200 ? this.scrollHeight : 200) + 'px';
        });

        // Enter to send, Shift+Enter for new line
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        function renderMarkdown(text) {
            // Convert deepseek's <think> tags into HTML details/summary elements
            let processed = text.replace(/<think>/g, '<details class="reasoning"><summary>Reasoning</summary>\n\n')
                                .replace(/<\/think>/g, '\n\n</details>\n\n');
            
            // Auto-close if we are streaming and the closing tag hasn't arrived yet
            if (processed.includes('<details') && !processed.includes('</details>')) {
                processed += '\n\n</details>';
            }

            return marked.parse(processed);
        }

        function appendMessage(role, content) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            
            if (role === 'user') {
                bubble.textContent = content; // render user messages as plain text to prevent HTML injection
            } else {
                bubble.innerHTML = renderMarkdown(content);
            }

            msgDiv.appendChild(bubble);
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            return { msgDiv, bubble };
        }

        async function sendMessage() {
            const content = chatInput.value.trim();
            if (!content || isGenerating) return;

            // Reset input
            chatInput.value = '';
            chatInput.style.height = 'auto';
            
            // Append user message
            appendMessage('user', content);
            conversationHistory.push({ role: 'user', content: content });

            // Setup generating state
            isGenerating = true;
            sendBtn.disabled = true;
            
            // Create assistant bubble placeholder
            const { bubble } = appendMessage('assistant', '');
            bubble.innerHTML = '<span style="color: var(--text-muted); font-style: italic;">Thinking...</span><span class="cursor"></span>';

            let assistantContent = '';

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: conversationHistory })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                bubble.innerHTML = '<span class="cursor"></span>';

                // Read SSE Stream via ReadableStream
                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let buffer = '';

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); // keep the last incomplete line in buffer
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.slice(6);
                            if (dataStr.trim() === '[DONE]') continue;
                            
                            try {
                                const data = JSON.parse(dataStr);
                                if (data.content) {
                                    assistantContent += data.content;
                                    // Update markdown view and append blinking cursor
                                    bubble.innerHTML = renderMarkdown(assistantContent) + '<span class="cursor"></span>';
                                    
                                    // Keep scrolled to bottom
                                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                                } else if (data.error) {
                                    console.error('Server returned an error:', data.error);
                                    assistantContent += `\n\n**Error:** ${data.error}`;
                                    bubble.innerHTML = renderMarkdown(assistantContent);
                                }
                            } catch (e) {
                                console.error('Error parsing SSE json', e, dataStr);
                            }
                        }
                    }
                }
            } catch (err) {
                console.error('Fetch error:', err);
                assistantContent += `\n\n**Connection Error:** Could not reach the local server. Is it running?`;
                bubble.innerHTML = renderMarkdown(assistantContent);
            } finally {
                // Remove cursor now that generation is done
                bubble.innerHTML = renderMarkdown(assistantContent);
                
                // Add complete assistant response to conversation history
                conversationHistory.push({ role: 'assistant', content: assistantContent });
                
                // Restore state
                isGenerating = false;
                sendBtn.disabled = false;
                chatInput.focus();
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }
        }
    </script>
</body>
</html>
